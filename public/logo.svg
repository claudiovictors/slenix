<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <radialGradient id="grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5A4FCF"/>
      <stop offset="100%" stop-color="#3023AE"/>
    </radialGradient>
  </defs>
  <!-- Base circular -->
  <circle cx="80" cy="80" r="70" fill="url(#grad)" />
  <!-- Forma central abstrata -->
  <path d="M60 50 C80 40, 100 40, 100 70 C100 100, 80 110, 60 100 C40 90, 40 70, 60 50 Z" fill="#EDE7F6" />
  <!-- Traço diagonal estilizado -->
  <path d="M60 50 L100 100" stroke="#3023AE" stroke-width="6" stroke-linecap="round" />
  <!-- Traço horizontal interno -->
  <path d="M50 80 L110 80" stroke="#3023AE" stroke-width="4" stroke-linecap="round" />
  <!-- Texto subido -->
  <text x="80" y="130" text-anchor="middle" font-family="Verdana, sans-serif" font-weight="bold" font-size="22" fill="#EDE7F6">Slenix</text>
</svg>
